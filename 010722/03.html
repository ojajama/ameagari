<tr>
<th align=left>
6月2日
</th>
</tr>
<tr>
<td>
<p>
ばあちゃんは、ヨーデルの部屋に戻っていた。<br>
孫娘二人がベッドの近くにやってきたときは、少し反応した。<br>
その後は無表情のままだ。
<p>
カメラを向けようが、おやつを見せようが、なんの反応もしない。<br>
所在なく、なんとなく、力こぶを作って見せたら、<br>
唇をゆがめて、口を開けて、笑った。<br>
しかも、いやだねぇ、と言った。<br>
今日始めて聞いた言葉。
<p>
妹が、酔っぱらって作った痣を見せると、<br>
うんうんとうなずいた。<br>
体操を始めると、<br>
穏やかに微笑んだ。
<p>
二人して、交互に、先に「笑いを取った」しぐさをしてみたが、<br>
同じことを二度しても、笑わない。<br>
芸に厳しい。
</td>
